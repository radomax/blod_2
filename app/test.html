<!DOCTYPE html>
<html>
<head>
    <title>Railway Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .success { color: #22c55e; font-size: 48px; }
        .links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a:hover { background: #764ba2; }
        .info {
            margin-top: 20px;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 5px;
            text-align: left;
        }
        code {
            background: #e5e7eb;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✅</div>
        <h1>Railway is Working!</h1>
        <p>If you can see this page, your Apache server is correctly serving files.</p>
        
        <div class="info">
            <h3>Quick Debug Info:</h3>
            <p>Current time: <strong id="time"></strong></p>
            <p>Your files are in: <code>/var/www/html/</code></p>
            <p>This file: <code>/test-railway.html</code></p>
        </div>
        
        <div class="links">
            <h3>Test Your App:</h3>
            <a href="/index.html">Go to Main App (index.html)</a>
            <a href="/test.php">PHP Test (test.php)</a>
            <a href="/db-test.php">Database Test (db-test.php)</a>
            <a href="/api/blood_pressure.php?test=1">API Test</a>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('no-NO');
    </script>
</body>
</html>
